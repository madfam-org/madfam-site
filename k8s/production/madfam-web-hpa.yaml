---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: madfam-web
  labels:
    app: madfam-web
    app.kubernetes.io/name: madfam-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: madfam-platform
    enclii.dev/managed-by: switchyard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: madfam-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
