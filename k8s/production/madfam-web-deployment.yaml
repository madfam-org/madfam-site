---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: madfam-web
  labels:
    app: madfam-web
    app.kubernetes.io/name: madfam-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: madfam-platform
    enclii.dev/managed-by: switchyard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: madfam-web
  template:
    metadata:
      labels:
        app: madfam-web
        app.kubernetes.io/name: madfam-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: madfam-platform
        enclii.dev/managed-by: switchyard
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/madfam-org/madfam-site/web:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          envFrom:
            - secretRef:
                name: madfam-site-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
