---
# Secret template for reference - DO NOT commit with real values
# Populate the actual secret via kubectl:
#   kubectl patch secret madfam-site-secrets -n madfam-site --type=json \
#     -p '[{"op":"add","path":"/data/DATABASE_URL","value":"<base64>"},
#          {"op":"add","path":"/data/PAYLOAD_SECRET","value":"<base64>"}]'
#
# Required keys: DATABASE_URL, NEXTAUTH_SECRET, NEXTAUTH_URL,
#                JANUA_CLIENT_ID, JANUA_SECRET, PAYLOAD_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: madfam-site-secrets
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Replace=false
  labels:
    app.kubernetes.io/part-of: madfam-platform
    enclii.dev/managed-by: switchyard
type: Opaque
# data populated via kubectl — NOT managed by ArgoCD
