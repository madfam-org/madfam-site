---
# Secret template for reference - DO NOT commit with real values
# Create the actual secret via kubectl:
#   kubectl create secret generic madfam-site-secrets \
#     --namespace=madfam-site \
#     --from-literal=DATABASE_URL='postgresql://...' \
#     --from-literal=NEXTAUTH_SECRET='...' \
#     --from-literal=NEXTAUTH_URL='https://madfam.io' \
#     --from-literal=JANUA_CLIENT_ID='...' \
#     --from-literal=JANUA_SECRET='...' \
#     --from-literal=PAYLOAD_SECRET='...'
apiVersion: v1
kind: Secret
metadata:
  name: madfam-site-secrets
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Replace=false
  labels:
    app.kubernetes.io/part-of: madfam-platform
    enclii.dev/managed-by: switchyard
type: Opaque
stringData:
  DATABASE_URL: ""
  NEXTAUTH_SECRET: ""
  NEXTAUTH_URL: ""
  JANUA_CLIENT_ID: ""
  JANUA_SECRET: ""
  PAYLOAD_SECRET: ""
