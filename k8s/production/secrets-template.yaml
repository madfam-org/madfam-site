---
# Secret key template for reference - DO NOT commit real or base64 values.
# Preferred path: manage actual values through Enclii secrets backed by
# Lockbox/Vault/ESO.
#
# Direct kubectl secret mutation is bootstrap/break-glass only when Enclii is
# unavailable or missing an adapter. Record the reason and reconcile values back
# into the secret store afterward.
#
# Required keys: DATABASE_URL, NEXTAUTH_SECRET, NEXTAUTH_URL,
#                JANUA_CLIENT_ID, JANUA_SECRET, PAYLOAD_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: madfam-site-secrets
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Replace=false
  labels:
    app.kubernetes.io/part-of: madfam-platform
    enclii.dev/managed-by: switchyard
type: Opaque
# data populated by Enclii/Vault/ESO; NOT managed by ArgoCD
