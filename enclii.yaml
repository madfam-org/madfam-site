apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: madfam-site
  project: madfam-site
spec:
  # status.madfam.io tracking — pre-existing entry was hand-added on the
  # platform configmap before the zero-touch model. Declared here so
  # `POST /v1/admin/status/regenerate` keeps it on the page. See Phase 2
  # follow-up backfill 2026-04-27.
  status:
    enabled: true
    entries:
      - name: MADFAM Website
        url: https://madfam.io
        href: https://madfam.io
        group: MADFAM Site
        family: MADFAM Corporate
        description: Corporate website
  runtime:
    port: 3000
  domains:
    - name: madfam.io
    - name: www.madfam.io
    - name: docs.madfam.io
  network:
    services:
      - name: madfam-web
        port: 3000
        ingress: [cloudflare-tunnel]
        egress: [dns, https]
      - name: madfam-cms
        port: 3000
        ingress: [cloudflare-tunnel]
        egress: [dns, https, postgres]
